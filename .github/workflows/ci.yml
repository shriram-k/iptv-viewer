name: CI

on:
  pull_request:
    paths:
      - 'pipeline/**'
      - 'app/**'
      - 'package.json'
      - '.github/workflows/ci.yml'
  push:
    branches: [master]
    paths:
      - 'pipeline/**'
      - 'app/**'
  workflow_dispatch:

jobs:
  pipeline-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The pipeline suite uses the Node built-in test runner and global fetch —
      # no dependencies to install.
      - name: Run pipeline tests
        run: npm run test:pipeline

  app-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install
        run: npm ci

      - name: Run app tests
        run: npm run test
